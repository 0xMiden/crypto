# cargo-deny configuration for Miden VM workspace

# Graph configuration
[graph]
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]

# Advisory database configuration
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
  # paste crate is unmaintained but still functional; transitively used by Plonky3
  "RUSTSEC-2024-0436",
]
yanked = "warn"

# License configuration
[licenses]
allow = [
  "Apache-2.0 WITH LLVM-exception",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
exceptions = []

# Bans configuration
[bans]
allow = []
deny = []
highlight = "all"
multiple-versions = "deny"
skip = [
  # Allow duplicate spin versions - transitively pulled by p3-dft and flume
  { name = "spin" },
  # Allow rand/rand_core/getrandom duplicates — miden-crypto uses rand 0.9 while Plonky3 uses 0.10
  { name = "getrandom" },
  { name = "rand", version = "=0.9.2" },
  { name = "rand_core" },
]
skip-tree = []
wildcards = "allow"

# Sources configuration
[sources]
allow-git        = ["https://github.com/Nashtare/p3-miden", "https://github.com/Plonky3/Plonky3"]
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
unknown-git      = "deny"
unknown-registry = "deny"
